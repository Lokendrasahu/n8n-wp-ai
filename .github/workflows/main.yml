name: "Production vFinal (Strict & Clean)"

on:
  workflow_dispatch:

concurrency:
  group: "production-bot"
  cancel-in-progress: false

jobs:
  run-final-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: ⚡ Optimize Environment
        run: |
          sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
          sudo apt-get update && sudo apt-get install -y sqlite3 curl ffmpeg
          npm install @supabase/supabase-js
          echo "✅ System Tuned"

      - name: 💾 Setup Data Layer & Pre-Run Backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          N8N_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
        run: |
          mkdir -p n8n_data/nodes whatsapp
          
          cat << 'EOF' > smart_sync.js
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs'); const { execSync, spawnSync } = require('child_process');
          const sb = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);
          const live='n8n_data/database.sqlite', safe='n8n_data/db_snap.sqlite';

          async function run(mode) {
            try {
              if(mode==='down') {
                const { data, error } = await sb.storage.from('bot-storage').download('database.sqlite');
                if(!error && data) {
                  fs.writeFileSync(live, Buffer.from(await data.arrayBuffer()));
                  try { execSync("sqlite3 " + live + " 'PRAGMA journal_mode=WAL;'"); } catch(e) {}
                }
              } else {
                if(!fs.existsSync(live)) return;
                try { execSync("sqlite3 " + live + " 'PRAGMA wal_checkpoint(FULL);'"); } catch(e) {}
                if(fs.existsSync(safe)) fs.unlinkSync(safe);
                execSync("sqlite3 " + live + " \".backup '" + safe + "'\"");
                const { error } = await sb.storage.from('bot-storage').upload('database.sqlite', fs.readFileSync(safe), { upsert: true });
                if(!error && process.env.TG_TOKEN) {
                    const caption = "🚀 <b>HEALTHY BACKUP READY</b>\n📂 Use for Hugging Face.";
                    spawnSync("curl", ["-F", `chat_id=${process.env.TG_ID}`, "-F", `document=@${safe};filename=n8n_healthy.sqlite`, "-F", `caption=${caption}`, "-F", "parse_mode=HTML", `https://api.telegram.org/bot${process.env.TG_TOKEN}/sendDocument`]);
                }
              }
            } catch(e) { console.error("Sync Error:", e.message); }
          }
          run(process.argv[2]);
          EOF
          
          node smart_sync.js down
          node smart_sync.js up
          sudo chmod -R 777 n8n_data

      - name: 🚀 Launch Bot Swarm
        env:
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          NGROK_DOMAIN: ${{ secrets.NGROK_DOMAIN }}
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          docker network create bot-net || true
          ngrok config add-authtoken $NGROK_TOKEN
          ngrok http --domain=$NGROK_DOMAIN 80 > /dev/null &
          sleep 5

          docker run -d --name n8n --network bot-net --restart unless-stopped \
            -v $(pwd)/n8n_data:/home/node/.n8n \
            -e N8N_ENCRYPTION_KEY="$N8N_ENCRYPTION_KEY" \
            -e WEBHOOK_URL="https://$NGROK_DOMAIN" \
            n8nio/n8n

          # Yahan aap apne baaki ke Docker containers (WA, AI) bhi add kar sakte hain

      - name: 🔄 Observer & Auto-Sync
        env:
          # 🟢 FIX: Important variables passed to the loop
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          N8N_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          START=$(date +%s)
          while true; do
              DIFF=$(($(date +%s) - START))
              if [ $DIFF -ge 21000 ]; then
                  sqlite3 n8n_data/database.sqlite "PRAGMA wal_checkpoint(FULL);" || true
                  node smart_sync.js up
                  gh workflow run main.yml || true
                  exit 0
              fi
              if [ $((DIFF % 900)) -lt 10 ] && [ $DIFF -gt 100 ]; then 
                  sqlite3 n8n_data/database.sqlite "PRAGMA wal_checkpoint(FULL);" || true
                  node smart_sync.js up
              fi
              sleep 60
          done
