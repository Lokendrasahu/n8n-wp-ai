name: "Production UltraLight"

on:
  workflow_dispatch:

concurrency:
  group: production-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 1️⃣ SAFE DISK SWAP + MINIMAL SETUP
      - name: ⚡ Minimal Setup
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile || true

          sudo fallocate -l 2G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          sudo apt-get update
          sudo apt-get install -y sqlite3 curl

          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update
          sudo apt-get install -y ngrok

          npm install @supabase/supabase-js

      # 2️⃣ CACHE (ONLY WA BOT)
      - name: 📦 Cache WA Modules
        uses: actions/cache@v3
        with:
          path: whatsapp/node_modules
          key: wa-cache-${{ runner.os }}

      # 3️⃣ SMART BACKUP SYNC
      - name: 💾 Smart Sync
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          mkdir -p n8n_data whatsapp public

          cat << 'EOF' > smart_sync.js
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');
          const { execSync } = require('child_process');

          const sbUrl = process.env.SUPABASE_URL;
          if (!sbUrl || !sbUrl.startsWith('http')) process.exit(1);

          const sb = createClient(sbUrl, process.env.SUPABASE_KEY);
          const live='n8n_data/database.sqlite', safe='n8n_data/db_snap.sqlite';

          async function run(mode) {
            try {
              if(mode==='down') {
                const { data, error } = await sb.storage.from('bot-storage').download('database.sqlite');
                if(!error) fs.writeFileSync(live, Buffer.from(await data.arrayBuffer()));
              } else {
                if(!fs.existsSync(live)) return;
                execSync(`sqlite3 ${live} ".backup '${safe}'"`);
                await sb.storage.from('bot-storage').upload('database.sqlite', fs.readFileSync(safe), { upsert: true });
              }
            } catch(e) {}
          }
          run(process.argv[2]);
          EOF

          node smart_sync.js down
          sudo chmod -R 777 n8n_data

      # 4️⃣ LAUNCH SERVICES
      - name: 🚀 Launch Services
        env:
          NGROK_AUTH: ${{ secrets.NGROK_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          docker network create bot-net || true

          ngrok config add-authtoken $NGROK_AUTH
          ngrok http --domain=${{ secrets.NGROK_DOMAIN }} 80 > /dev/null &
          sleep 5

          # n8n (low memory)
          docker run -d --name n8n --network bot-net --restart unless-stopped \
            -v $(pwd)/n8n_data:/home/node/.n8n \
            -e N8N_ENCRYPTION_KEY="${{ secrets.N8N_ENCRYPTION_KEY }}" \
            -e NODE_OPTIONS="--max-old-space-size=1024" \
            -e EXECUTIONS_DATA_SAVE_ON_SUCCESS=none \
            -e N8N_LOG_LEVEL=error \
            n8nio/n8n

          # WhatsApp Bot
          docker run -d --name wa-bot --network bot-net --restart unless-stopped \
            -v $(pwd)/whatsapp:/app -w /app \
            -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            node:20-alpine sh -c "npm install && node index.js"

          # Caddy Proxy
          printf ":80 {\n reverse_proxy /qr wa-bot:10000\n reverse_proxy /reset wa-bot:10000\n reverse_proxy /* n8n:5678\n}\n" > Caddyfile

          docker run -d --name caddy --network bot-net -p 80:80 \
            -v $(pwd)/Caddyfile:/etc/caddy/Caddyfile \
            caddy:latest

          curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
            -d chat_id=$TG_ID \
            -d text="🟢 UltraLight System Online"

      # 5️⃣ OBSERVER LOOP
      - name: 🔄 Observer
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          trap 'if [ $? -ne 0 ]; then node smart_sync.js up; fi' EXIT

          START=$(date +%s)
          while true; do
            NOW=$(date +%s)
            DIFF=$((NOW - START))

            if [ $DIFF -ge 21000 ]; then
              gh workflow run main.yml || true
              node smart_sync.js up
              trap - EXIT
              exit 0
            fi

            if ! docker ps | grep -q n8n; then docker restart n8n; fi
            if ! docker ps | grep -q wa-bot; then docker restart wa-bot; fi

            sleep 60
          done

      - name: 🚨 Notify Failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
            -d chat_id=$TG_ID \
            -d text="⚠️ Bot crashed"
