name: "Nexus Core: Multi-Vendor AI (Zero-Downtime)"

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-nexus-core:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==================================================================
      # 1. PRE-FLIGHT (Setup environment & Inject Libsodium)
      # ==================================================================
      - name: ⚡ Optimize Environment & Setup
        run: |
          sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
          sudo sysctl -w net.core.default_qdisc=fq && sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo apt-get update && sudo apt-get install -y sqlite3 curl zip jq
          
          npm init -y
          npm config set registry https://registry.npmjs.org/
          npm install @supabase/supabase-js

      - name: 🐋 Pre-Fetch Docker Images & Dependencies
        run: |
          echo "📥 Downloading massive images in background..."
          docker pull cloudflare/cloudflared:latest
          docker pull n8nio/n8n:latest
          docker pull caddy:latest
          docker pull node:20-alpine
          
          mkdir -p whatsapp public n8n_data/nodes n8n_data/node_modules
          echo '{"name":"wa-bot","dependencies":{"@whiskeysockets/baileys":"^6.7.0","axios":"^1.6.0","express":"^4.18.2","mongoose":"^8.0.0","pino":"^8.16.1","qrcode":"^1.5.3","node-cache":"^5.1.2"}}' > whatsapp/package.json
          
          # Compile WhatsApp Dependencies
          docker run --rm -v $(pwd)/whatsapp:/app -w /app node:20-alpine sh -c "apk add --no-cache git ffmpeg python3 make g++ libc6-compat && npm install"

          # [LIBSODIUM FIX]: Pre-install directly inside the n8n_data persistent volume
          docker run --rm -v $(pwd)/n8n_data:/n8n_data -w /n8n_data node:20-alpine sh -c "apk add --no-cache python3 make g++ libc6-compat && npm install libsodium-wrappers"

      - name: 📦 Cache Modules
        uses: actions/cache@v4
        with:
          path: |
            n8n_data/nodes
            n8n_data/node_modules
            whatsapp/node_modules
            node_modules
          key: bot-multi-vfinal-${{ runner.os }}

      # ==================================================================
      # 2. THE TAKEOVER PROTOCOL (New Bot Waits for Old Bot)
      # ==================================================================
      - name: 🤝 Wait for Active Bot to Complete Handover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLDER_RUNS=$(gh run list --workflow="main.yml" --status=in_progress --json databaseId -q "[.[] | select(.databaseId < ${{ github.run_id }})] | .[].databaseId")
          
          if [ -n "$OLDER_RUNS" ]; then
            for OLD_RUN in $OLDER_RUNS; do
              echo "⏳ Found active older bot ($OLD_RUN). Waiting patiently for it to gracefully save data and exit..."
              while gh run view $OLD_RUN --json status -q '.status' | grep -q "in_progress"; do
                echo "   ...Old bot is finalizing backup..."
                sleep 5
              done
              echo "✅ Older bot ($OLD_RUN) safely terminated."
            done
            echo "🚀 The stage is fully cleared. Taking over!"
          else
            echo "🟢 No older runs found. Starting fresh."
          fi

      # ==================================================================
      # 3. SMART DATA SYNC (The Brains of the Backup)
      # ==================================================================
      - name: 💾 Setup Data Layer
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cat << 'EOF' > smart_sync.js
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs'); const { execSync } = require('child_process');
          
          const sbUrl = process.env.SUPABASE_URL;
          if (!sbUrl) process.exit(1);

          const sb = createClient(sbUrl, process.env.SUPABASE_KEY);
          const live='n8n_data/database.sqlite', safe='n8n_data/db_snap.sqlite';

          async function retry(fn) {
            for (let i=0; i<3; i++) {
              try { await fn(); return; } catch (err) { await new Promise(r => setTimeout(r, 2000)); }
            }
          }

          async function run(mode) {
            if(mode==='down') {
              console.log("📥 Downloading Database from Supabase...");
              await retry(async () => {
                 const { data, error } = await sb.storage.from('bot-storage').download('database.sqlite');
                 if(!error) {
                   fs.writeFileSync(live, Buffer.from(await data.arrayBuffer()));
                   try { execSync("sqlite3 " + live + " 'PRAGMA journal_mode=WAL;'"); } catch(e) {}
                 }
              });
            } else if (mode === 'live_backup') {
              // [USER LOGIC]: Heavy backup happens HERE while bot is STILL ALIVE
              console.log("📤 [PHASE 1] Starting LIVE Heavy Backup (No Downtime)...");
              try {
                  execSync("docker exec n8n n8n export:workflow --all --output=/home/node/.n8n/workflows.json");
                  execSync("docker exec n8n n8n export:credentials --all --decrypted --output=/home/node/.n8n/creds_decrypted.json");
                  execSync("cd n8n_data && zip -P Nexus123 n8n_secrets.zip creds_decrypted.json workflows.json");
                  
                  const tgMsg1 = "📎 n8n_secrets.zip n8n Secrets Backup\nPassword: Nexus123";
                  execSync(`curl -s -F document=@n8n_data/n8n_secrets.zip -F caption="${tgMsg1}" https://api.telegram.org/bot${process.env.TG_TOKEN}/sendDocument?chat_id=${process.env.TG_ID}`);
                  execSync("rm -f n8n_data/creds_decrypted.json n8n_data/workflows.json n8n_data/n8n_secrets.zip");
              } catch(err) { console.log("Live export skipped/failed"); }
              
            } else if (mode === 'final_db_sync') {
              // [USER LOGIC]: Final DB sync happens after connections are cut
              console.log("📤 [PHASE 3] Starting FINAL DB SYNC (Bot is now offline)...");
              if(!fs.existsSync(live)) return;
              
              try { execSync("sqlite3 " + live + " 'VACUUM;'"); } catch(e) {}
              if(fs.existsSync(safe)) fs.unlinkSync(safe);
              
              try {
                  execSync("sqlite3 " + live + " \".backup '" + safe + "'\"");
                  const tgMsg2 = `📎 n8n_backup.sqlite Backup Saved (Max 100 Execs)\nTime: ${new Date().toISOString()}`;
                  execSync(`curl -s -F document=@${safe} -F caption="${tgMsg2}" https://api.telegram.org/bot${process.env.TG_TOKEN}/sendDocument?chat_id=${process.env.TG_ID}`);
              } catch(err) { console.log("DB SQLite copy failed"); }

              await retry(async () => {
                 await sb.storage.from('bot-storage').upload('database.sqlite', fs.readFileSync(safe), { upsert: true });
              });
            }
          }
          run(process.argv[2]);
          EOF
          
          node smart_sync.js down
          sudo chmod -R 777 n8n_data

      # ==================================================================
      # 4. LAUNCH SERVICES
      # ==================================================================
      - name: 🚀 Launch Bot Swarm
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CF_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          docker network create bot-net || true
          
          docker run -d --name cloudflared --network host --restart unless-stopped \
            cloudflare/cloudflared:latest tunnel --no-autoupdate run --token $CF_TOKEN
          
          docker run -d --name n8n --network bot-net --restart unless-stopped \
            -v $(pwd)/n8n_data:/home/node/.n8n \
            -e N8N_ENCRYPTION_KEY="${{ secrets.N8N_ENCRYPTION_KEY }}" \
            -e WEBHOOK_URL="https://nexusautomation.dpdns.org" \
            -e NODE_OPTIONS="--max-old-space-size=2048" \
            -e DB_SQLITE_VACUUM_ON_STARTUP=true \
            -e NODE_FUNCTION_ALLOW_BUILTIN=* \
            -e NODE_FUNCTION_ALLOW_EXTERNAL=* \
            -e EXECUTIONS_DATA_PRUNE=true \
            -e EXECUTIONS_DATA_MAX_AGE=48 \
            -e EXECUTIONS_DATA_PRUNE_MAX_COUNT=100 \
            -e N8N_WORKFLOW_HISTORY_ENABLED=false \
            -e N8N_DIAGNOSTICS_ENABLED=false \
            -e N8N_VERSION_NOTIFICATIONS_ENABLED=false \
            n8nio/n8n

          cat << 'EOF' > whatsapp/index.js
          const { default: makeWASocket, DisconnectReason, BufferJSON, fetchLatestBaileysVersion } = require('@whiskeysockets/baileys');
          const express = require('express'); const axios = require('axios'); const mongoose = require('mongoose'); const QRCode = require('qrcode'); const pino = require('pino');
          const NodeCache = require('node-cache');
          const app = express(); app.use(express.json());
          const PORT = 10000;
          const N8N_URL = "http://n8n:5678/webhook/whatsapp"; 
          const MONGO_URL = process.env.MONGODB_URI;

          const AuthModel = mongoose.model('Auth_Multi_V3', new mongoose.Schema({ _id: String, data: Object }), 'auth_multi_v3');
          const sessions = { v1: null, v2: null };
          const qrs = { v1: null, v2: null };

          async function useAuth(v) {
              if(mongoose.connection.readyState === 0) await mongoose.connect(MONGO_URL, { dbName: 'wa_bot_db' });
              
              const writeData = async (data, id) => { 
                  const json = JSON.parse(JSON.stringify(data, BufferJSON.replacer)); 
                  await AuthModel.findOneAndUpdate({ _id: `${v}-${id}` }, { data: json }, { upsert: true }); 
              };
              const readData = async (id) => { 
                  const doc = await AuthModel.findById(`${v}-${id}`); 
                  return doc ? JSON.parse(JSON.stringify(doc.data), BufferJSON.reviver) : null; 
              };
              const removeData = async (id) => { await AuthModel.findByIdAndDelete(`${v}-${id}`); };
              
              const creds = (await readData('creds')) || (await (require('@whiskeysockets/baileys').initAuthCreds)());

              return { 
                  state: { creds, keys: { 
                      get: async (t, i) => { 
                          const d = {}; 
                          await Promise.all(i.map(async id => { 
                              let vd = await readData(`${t}-${id}`); 
                              if (t === 'app-state-sync-key' && vd) vd = require('@whiskeysockets/baileys/lib/Utils/auth-utils').proto.Message.AppStateSyncKeyData.fromObject(vd); 
                              if (vd) d[id] = vd; 
                          })); return d; 
                      }, 
                      set: async (d) => { 
                          for (const c in d) for (const i in d[c]) { 
                              const val = d[c][i]; val ? await writeData(val, `${c}-${i}`) : await removeData(`${c}-${i}`); 
                          } 
                      } 
                  } }, 
                  saveCreds: () => writeData(creds, 'creds') 
              };
          }

          async function sendWebhookWithRetry(payload, retries = 5) {
              for (let i = 0; i < retries; i++) {
                  try {
                      await axios.post(N8N_URL, payload);
                      return; 
                  } catch (err) {
                      if (i === retries - 1) console.error("Webhook failed completely after retries.");
                      else await new Promise(r => setTimeout(r, 4000));
                  }
              }
          }

          async function start(v) {
              const { state, saveCreds } = await useAuth(v);
              const { version } = await fetchLatestBaileysVersion();
              const msgRetryCounterCache = new NodeCache();
              
              const sock = makeWASocket({ version, auth: state, logger: pino({ level: 'silent' }), browser: ["Ubuntu", "Chrome", "20.0"], msgRetryCounterCache });
              
              sessions[v] = sock;
              sock.ev.on('creds.update', saveCreds);
              
              sock.ev.on('connection.update', (u) => { 
                  if(u.qr) qrs[v] = u.qr; 
                  if(u.connection === 'open') { qrs[v] = null; }
                  if(u.connection === 'close' && u.lastDisconnect?.error?.output?.statusCode !== DisconnectReason.loggedOut) setTimeout(() => start(v), 5000);
              });
              
              sock.ev.on('messages.upsert', async ({ messages }) => {
                  const msg = messages[0]; 
                  if(!msg.message || msg.key.fromMe) return;
                  await sendWebhookWithRetry({ vendor: v, full_json: msg });
              });
          }

          app.get('/qr', async (req, res) => {
              const v = req.query.v || 'v1';
              const meta = '<meta http-equiv="refresh" content="5">';
              if(sessions[v]?.user) return res.send(`${meta} <h1>✅ ${v} Connected</h1>`);
              if(!qrs[v]) return res.send(`${meta} <h1>⏳ Generating QR for ${v}...</h1>`);
              res.send(`${meta} <div style="text-align:center"><h1>QR ${v}</h1><img src="${await QRCode.toDataURL(qrs[v])}" /></div>`);
          });

          app.get('/reset', async (req, res) => {
              const v = req.query.v; 
              if(!v) return res.send("Specify vendor: ?v=v1 or ?v=v2");
              await AuthModel.deleteMany({ _id: { $regex: `^${v}-` } });
              if(sessions[v]) sessions[v].logout();
              res.send(`<h1>♻️ ${v} Reset.</h1><script>setTimeout(()=>location.href='/qr?v=${v}', 3000)</script>`);
              setTimeout(() => start(v), 2000);
          });

          app.post('/send', async (req, res) => {
              const { vendor, number, message } = req.body;
              const sock = sessions[vendor];
              if(!sock?.user) return res.status(503).json({ error: `${vendor} Offline` });
              const jid = number.includes('@') ? number : `${number}@s.whatsapp.net`;
              await sock.sendMessage(jid, { text: message });
              res.json({ status: true, via: vendor });
          });

          app.get('/health', (req, res) => res.send("OK"));
          app.listen(PORT, () => { start('v1'); start('v2'); });
          EOF

          printf ":80 {\n reverse_proxy /qr* wa-bot:10000\n reverse_proxy /reset* wa-bot:10000\n reverse_proxy /health wa-bot:10000\n reverse_proxy /* n8n:5678\n}\n" > Caddyfile
          docker run -d --name caddy --network bot-net -p 80:80 -v $(pwd)/Caddyfile:/etc/caddy/Caddyfile caddy:latest
          
          docker run -d --name wa-bot --network bot-net --restart unless-stopped -v $(pwd)/whatsapp:/app -w /app -e MONGODB_URI="${{ secrets.MONGODB_URI }}" -e TZ="Asia/Kolkata" node:20-alpine sh -c "apk add --no-cache ffmpeg tzdata && node index.js"
          
          curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage -d chat_id=$TG_ID -d text="🟢 <b>System Online @ nexusautomation.dpdns.org</b> (Start/Handover Complete)" -d parse_mode="HTML"

      # ==================================================================
      # 5. THE SELF-AWARE OBSERVER (Zero Session Collision & Data Loss Logic)
      # ==================================================================
      - name: 🔄 Observer Loop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: |
          START=$(date +%s)
          echo "🔄 Observer Active. Serving Clients and watching for incoming handover signals..."
          
          while true; do
              NOW=$(date +%s); DIFF=$((NOW - START))
              
              # Condition 1: Normal Auto-Handover (5 hours 50 mins)
              if [ $DIFF -ge 21000 ]; then
                  echo "⏰ Time limit (5h 50m) reached. Triggering a fresh bot..."
                  gh workflow run main.yml
                  sleep 60 # Give the new bot time to wake up and fetch images
                  break # Exit loop to run Graceful Shutdown
              fi
              
              # Condition 2: Did someone MANUALLY start a new workflow from GitHub?
              NEWER_RUNS=$(gh run list --workflow="main.yml" --status=in_progress --json databaseId -q "[.[] | select(.databaseId > ${{ github.run_id }})] | length")
              if [ "$NEWER_RUNS" -gt 0 ]; then
                  echo "🔄 Newer manual run detected! Preparing to yield the stage..."
                  break # Exit loop to run Graceful Shutdown
              fi
              
              if ! docker ps | grep -q wa-bot; then docker restart wa-bot; fi
              if ! docker ps | grep -q n8n; then docker restart n8n; fi
              if ! docker ps | grep -q cloudflared; then docker restart cloudflared; fi
              
              sleep 30
          done
          
          # =========================================================
          # 🛑 THE GRACEFUL SHUTDOWN SEQUENCE (User Logic Applied)
          # =========================================================
          
          # PHASE 1: Heavy Backup WHILE BOT IS STILL ONLINE (Zero Data Loss, Zero Downtime)
          echo "💾 [PHASE 1] Backing up heavy n8n JSON files while system is still LIVE..."
          node smart_sync.js live_backup
          
          # PHASE 2: Kill Network Connections (Prevents Session Collision & locks the DB)
          echo "🔪 [PHASE 2] Instantly severing network traffic (wa-bot, n8n, cloudflared)..."
          docker kill cloudflared wa-bot n8n || true
          
          # PHASE 3: Fast SQLite Backup (Bot is now safely offline)
          echo "💾 [PHASE 3] Uploading exact, locked SQLite state..."
          node smart_sync.js final_db_sync
          
          # PHASE 4: Final Exit (This signals the waiting New Bot to take over instantly)
          echo "✅ Handover Data Saved & Connections Cut. Exiting so the New Bot can take over!"
          exit 0
