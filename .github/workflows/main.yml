name: "Nexus Core"

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-nexus-core:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Optimize Environment & Setup
        run: |
          set -euo pipefail

          if ! swapon --show | grep -q '/swapfile'; then
            sudo fallocate -l 4G /swapfile || true
            sudo chmod 600 /swapfile || true
            sudo mkswap /swapfile || true
            sudo swapon /swapfile || true
          fi

          sudo sysctl -w net.core.default_qdisc=fq || true
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr || true

          sudo apt-get update
          sudo apt-get install -y sqlite3 curl zip jq

          npm init -y
          npm config set registry https://registry.npmjs.org/
          npm install @supabase/supabase-js

      - name: 📦 Cache Modules
        uses: actions/cache@v4
        with:
          path: |
            n8n_data/node_modules
            whatsapp/node_modules
            node_modules
          key: nexus-core-cache-${{ runner.os }}-v9

      - name: 🐋 Pre-Fetch Docker Images & Dependencies
        run: |
          set -euo pipefail

          docker pull cloudflare/cloudflared:latest
          docker pull n8nio/n8n:latest
          docker pull caddy:latest
          docker pull node:20-alpine

          mkdir -p whatsapp public n8n_data n8n_data/node_modules

          cat > whatsapp/package.json << 'EOF'
          {
            "name": "wa-bot",
            "dependencies": {
              "@whiskeysockets/baileys": "^6.7.0",
              "axios": "^1.6.0",
              "express": "^4.18.2",
              "mongoose": "^8.0.0",
              "node-cache": "^5.1.2",
              "pino": "^8.16.1",
              "qrcode": "^1.5.3"
            }
          }
          EOF

          docker run --rm -v "$(pwd)/whatsapp:/app" -w /app node:20-alpine \
            sh -c "apk add --no-cache git ffmpeg python3 make g++ libc6-compat && npm install"

          docker run --rm -v "$(pwd)/n8n_data:/n8n_data" -w /n8n_data node:20-alpine \
            sh -c "apk add --no-cache python3 make g++ libc6-compat && npm install libsodium-wrappers"

      - name: 🤝 Execute Handover Protocol
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          RUNS_JSON=$(gh run list --workflow="${{ github.workflow }}" --limit 30 --json databaseId,status,createdAt)

          OLD_RUN=$(echo "$RUNS_JSON" | jq -r '
            map(
              select(
                (.databaseId | tostring) != "${{ github.run_id }}" and
                (.status == "queued" or .status == "requested" or .status == "waiting" or .status == "in_progress")
              )
            )
            | sort_by(.createdAt)
            | .[0].databaseId // empty
          ')

          if [ -z "$OLD_RUN" ]; then
            echo "No older active-like run found."
            exit 0
          fi

          gh run cancel "$OLD_RUN" || true

          ACTIVE=1
          for i in $(seq 1 60); do
            STATUS=$(gh run view "$OLD_RUN" --json status -q '.status' 2>/dev/null || echo "done")
            case "$STATUS" in
              queued|requested|waiting|in_progress)
                sleep 5
                ;;
              *)
                ACTIVE=0
                break
                ;;
            esac
          done

          if [ "$ACTIVE" -eq 1 ]; then
            echo "Old run still active. Aborting."
            exit 1
          fi

      - name: 💾 Setup Data Layer
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKUP_ZIP_PASSWORD: ${{ secrets.BACKUP_ZIP_PASSWORD }}
        run: |
          cat << 'EOF' > smart_sync.js
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const sbUrl = process.env.SUPABASE_URL;
          const sbKey = process.env.SUPABASE_KEY;
          const bucket = 'bot-storage';

          const live = 'n8n_data/database.sqlite';
          const safe = 'n8n_data/db_snap.sqlite';
          const pointerPath = 'meta/latest.json';

          if (!sbUrl || !sbKey) process.exit(1);

          const sb = createClient(sbUrl, sbKey);

          function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function retry(fn, retries = 3, delay = 1500) {
            let lastErr;
            for (let i = 0; i < retries; i++) {
              try {
                return await fn();
              } catch (err) {
                lastErr = err;
                await sleep(delay);
              }
            }
            throw lastErr;
          }

          function ensureParent(filePath) {
            fs.mkdirSync(path.dirname(filePath), { recursive: true });
          }

          function buildStamp() {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getUTCFullYear()}${pad(d.getUTCMonth() + 1)}${pad(d.getUTCDate())}_${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}`;
          }

          async function downloadPointer() {
            try {
              const { data, error } = await sb.storage.from(bucket).download(pointerPath);
              if (error) return null;
              return JSON.parse(Buffer.from(await data.arrayBuffer()).toString('utf8'));
            } catch {
              return null;
            }
          }

          async function downloadLatest() {
            ensureParent(live);

            const pointer = await retry(() => downloadPointer()).catch(() => null);
            if (!pointer || !pointer.path) return;

            const { data, error } = await retry(() => sb.storage.from(bucket).download(pointer.path));
            if (error) throw error;

            fs.writeFileSync(live, Buffer.from(await data.arrayBuffer()));

            try {
              execSync(`sqlite3 "${live}" "PRAGMA journal_mode=WAL;"`);
            } catch (_) {}
          }

          async function uploadFast() {
            if (!fs.existsSync(live)) return;

            if (fs.existsSync(safe)) fs.unlinkSync(safe);

            execSync(`sqlite3 "${live}" ".backup '${safe}'"`);

            const stamp = buildStamp();
            const snapPath = `snapshots/db_${stamp}.sqlite`;

            await retry(async () => {
              const { error } = await sb.storage.from(bucket).upload(
                snapPath,
                fs.readFileSync(safe),
                {
                  contentType: 'application/vnd.sqlite3',
                  upsert: false
                }
              );
              if (error) throw error;
            });

            const pointer = {
              path: snapPath,
              generated_at: new Date().toISOString()
            };

            await retry(async () => {
              const { error } = await sb.storage.from(bucket).upload(
                pointerPath,
                Buffer.from(JSON.stringify(pointer)),
                {
                  contentType: 'application/json',
                  upsert: true
                }
              );
              if (error) throw error;
            });
          }

          async function uploadFull() {
            if (!fs.existsSync(live)) return;

            try {
              execSync(
                'docker exec n8n n8n export:workflow --all --output=/home/node/.n8n/workflows.json',
                { stdio: 'ignore' }
              );

              execSync(
                'docker exec n8n n8n export:credentials --all --decrypted --output=/home/node/.n8n/creds_decrypted.json',
                { stdio: 'ignore' }
              );

              const password = process.env.BACKUP_ZIP_PASSWORD || '';
              if (!password) return;

              execSync(
                `cd n8n_data && zip -P "${password}" n8n_secrets.zip creds_decrypted.json workflows.json`,
                { stdio: 'ignore' }
              );

              if (process.env.TG_TOKEN && process.env.TG_ID && fs.existsSync('n8n_data/n8n_secrets.zip')) {
                execSync(
                  `curl -s -F document=@n8n_data/n8n_secrets.zip https://api.telegram.org/bot${process.env.TG_TOKEN}/sendDocument?chat_id=${process.env.TG_ID}`,
                  { stdio: 'ignore' }
                );
              }

              execSync(
                'rm -f n8n_data/creds_decrypted.json n8n_data/workflows.json n8n_data/n8n_secrets.zip',
                { stdio: 'ignore' }
              );
            } catch (_) {}
          }

          async function main() {
            const mode = process.argv[2];
            if (mode === 'down') await downloadLatest();
            if (mode === 'up_fast') await uploadFast();
            if (mode === 'up_full') await uploadFull();
          }

          main().catch((err) => {
            console.error(err?.message || err);
            process.exit(1);
          });
          EOF

          node smart_sync.js down || true
          sudo chmod -R 755 n8n_data whatsapp

      - name: 🚀 Launch Bot Swarm
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CF_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          set -euo pipefail

          docker network create bot-net || true
          docker rm -f cloudflared n8n caddy wa-bot >/dev/null 2>&1 || true

          docker run -d --name n8n --network bot-net --restart unless-stopped \
            -v "$(pwd)/n8n_data:/home/node/.n8n" \
            -e N8N_HOST="0.0.0.0" \
            -e N8N_PORT="5678" \
            -e N8N_PROTOCOL="http" \
            -e N8N_EDITOR_BASE_URL="https://nexusautomation.dpdns.org" \
            -e WEBHOOK_URL="https://nexusautomation.dpdns.org" \
            -e N8N_ENCRYPTION_KEY="${{ secrets.N8N_ENCRYPTION_KEY }}" \
            -e NODE_OPTIONS="--max-old-space-size=2048" \
            -e NODE_FUNCTION_ALLOW_BUILTIN=* \
            -e NODE_FUNCTION_ALLOW_EXTERNAL=* \
            -e EXECUTIONS_DATA_PRUNE=true \
            -e EXECUTIONS_DATA_MAX_AGE=48 \
            -e EXECUTIONS_DATA_PRUNE_MAX_COUNT=100 \
            -e N8N_WORKFLOW_HISTORY_ENABLED=false \
            -e N8N_DIAGNOSTICS_ENABLED=false \
            -e N8N_VERSION_NOTIFICATIONS_ENABLED=false \
            n8nio/n8n:latest

          cat > whatsapp/index.js << 'EOF'
          const { default: makeWASocket, DisconnectReason, BufferJSON, fetchLatestBaileysVersion, initAuthCreds } = require('@whiskeysockets/baileys');
          const express = require('express');
          const axios = require('axios');
          const mongoose = require('mongoose');
          const QRCode = require('qrcode');
          const pino = require('pino');
          const NodeCache = require('node-cache');

          const app = express();
          app.use(express.json());

          const PORT = 10000;
          const N8N_URL = 'http://n8n:5678/webhook/whatsapp';
          const MONGO_URL = process.env.MONGODB_URI;

          const AuthModel = mongoose.model(
            'Auth_Multi_V3',
            new mongoose.Schema({ _id: String, data: Object }, { strict: false }),
            'auth_multi_v3'
          );

          const sessions = { v1: null, v2: null };
          const qrs = { v1: null, v2: null };

          async function ensureMongo() {
            if (mongoose.connection.readyState !== 1) {
              await mongoose.connect(MONGO_URL, {
                dbName: 'wa_bot_db',
                serverSelectionTimeoutMS: 5000,
                heartbeatFrequencyMS: 10000
              });
            }
          }

          async function useAuth(v) {
            await ensureMongo();

            const writeData = async (data, id) => {
              const json = JSON.parse(JSON.stringify(data, BufferJSON.replacer));
              await AuthModel.findOneAndUpdate({ _id: `${v}-${id}` }, { data: json }, { upsert: true });
            };

            const readData = async (id) => {
              const doc = await AuthModel.findById(`${v}-${id}`);
              return doc ? JSON.parse(JSON.stringify(doc.data), BufferJSON.reviver) : null;
            };

            const removeData = async (id) => {
              await AuthModel.findByIdAndDelete(`${v}-${id}`);
            };

            const creds = (await readData('creds')) || initAuthCreds();

            return {
              state: {
                creds,
                keys: {
                  get: async (type, ids) => {
                    const data = {};
                    await Promise.all(ids.map(async (id) => {
                      let value = await readData(`${type}-${id}`);
                      if (type === 'app-state-sync-key' && value) {
                        value = require('@whiskeysockets/baileys/lib/Utils/auth-utils')
                          .proto.Message.AppStateSyncKeyData.fromObject(value);
                      }
                      if (value) data[id] = value;
                    }));
                    return data;
                  },
                  set: async (data) => {
                    for (const category in data) {
                      for (const id in data[category]) {
                        const value = data[category][id];
                        if (value) await writeData(value, `${category}-${id}`);
                        else await removeData(`${category}-${id}`);
                      }
                    }
                  }
                }
              },
              saveCreds: () => writeData(creds, 'creds')
            };
          }

          async function sendWebhookWithRetry(payload, retries = 5) {
            for (let i = 0; i < retries; i++) {
              try {
                await axios.post(N8N_URL, payload, { timeout: 10000 });
                return;
              } catch {
                if (i === retries - 1) return;
                await new Promise((r) => setTimeout(r, 4000));
              }
            }
          }

          async function start(v) {
            const { state, saveCreds } = await useAuth(v);
            const { version } = await fetchLatestBaileysVersion();
            const msgRetryCounterCache = new NodeCache();

            const sock = makeWASocket({
              version,
              auth: state,
              logger: pino({ level: 'silent' }),
              browser: ['Ubuntu', 'Chrome', '20.0'],
              msgRetryCounterCache
            });

            sessions[v] = sock;
            sock.ev.on('creds.update', saveCreds);

            sock.ev.on('connection.update', (u) => {
              if (u.qr) qrs[v] = u.qr;
              if (u.connection === 'open') qrs[v] = null;
              if (u.connection === 'close' && u.lastDisconnect?.error?.output?.statusCode !== DisconnectReason.loggedOut) {
                setTimeout(() => start(v), 5000);
              }
            });

            sock.ev.on('messages.upsert', async ({ messages }) => {
              const msg = messages[0];
              if (!msg?.message || msg.key?.fromMe) return;
              await sendWebhookWithRetry({ vendor: v, full_json: msg });
            });
          }

          app.get('/qr', async (req, res) => {
            const v = req.query.v || 'v1';
            const meta = '<meta http-equiv="refresh" content="5">';
            if (sessions[v]?.user) return res.send(`${meta}<h1>✅ ${v} Connected</h1>`);
            if (!qrs[v]) return res.send(`${meta}<h1>⏳ Generating QR for ${v}...</h1>`);
            res.send(`${meta}<div style="text-align:center"><h1>QR ${v}</h1><img src="${await QRCode.toDataURL(qrs[v])}" /></div>`);
          });

          app.get('/reset', async (req, res) => {
            const v = req.query.v;
            if (!v) return res.send('Specify vendor: ?v=v1 or ?v=v2');
            await AuthModel.deleteMany({ _id: { $regex: `^${v}-` } });
            if (sessions[v]) await sessions[v].logout();
            res.send(`<h1>♻️ ${v} Reset.</h1><script>setTimeout(()=>location.href='/qr?v=${v}',3000)</script>`);
            setTimeout(() => start(v), 2000);
          });

          app.post('/send', async (req, res) => {
            try {
              const { vendor, number, message } = req.body;
              const sock = sessions[vendor];
              if (!sock?.user) return res.status(503).json({ error: `${vendor} Offline` });
              const jid = number.includes('@') ? number : `${number}@s.whatsapp.net`;
              await sock.sendMessage(jid, { text: message });
              res.json({ status: true, via: vendor });
            } catch {
              res.status(500).json({ error: 'send_failed' });
            }
          });

          app.get('/health', (req, res) => res.send('OK'));

          app.listen(PORT, async () => {
            await start('v1');
            await start('v2');
          });
          EOF

          docker run -d --name wa-bot --network bot-net --restart unless-stopped \
            -v "$(pwd)/whatsapp:/app" -w /app \
            -e MONGODB_URI="$MONGODB_URI" \
            -e TZ="Asia/Kolkata" \
            node:20-alpine sh -c "apk add --no-cache ffmpeg tzdata && node index.js"

          cat > Caddyfile << 'EOF'
          :80 {
            reverse_proxy /qr* wa-bot:10000
            reverse_proxy /reset* wa-bot:10000
            reverse_proxy /health wa-bot:10000
            reverse_proxy * n8n:5678
          }
          EOF

          docker run -d --name caddy --network bot-net --restart unless-stopped \
            -p 80:80 \
            -v "$(pwd)/Caddyfile:/etc/caddy/Caddyfile" \
            caddy:latest

          echo "Waiting for local origin..."
          for i in $(seq 1 60); do
            ROOT_OK=0
            WA_OK=0

            curl -fsS http://127.0.0.1/ >/dev/null 2>&1 && ROOT_OK=1 || true
            curl -fsS http://127.0.0.1/health >/dev/null 2>&1 && WA_OK=1 || true

            if [ "$ROOT_OK" -eq 1 ] && [ "$WA_OK" -eq 1 ]; then
              break
            fi

            if [ "$i" -eq 60 ]; then
              docker logs n8n --tail 100 || true
              docker logs wa-bot --tail 100 || true
              docker logs caddy --tail 100 || true
              exit 1
            fi

            sleep 5
          done

          docker run -d --name cloudflared --network host --restart unless-stopped \
            cloudflare/cloudflared:latest tunnel --no-autoupdate run --token "$CF_TOKEN"

          docker logs cloudflared --tail 50 || true

          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d chat_id="$TG_ID" \
            -d text="🟢 <b>System Online @ nexusautomation.dpdns.org</b> (Start/Handover Complete)" \
            -d parse_mode="HTML" >/dev/null || true

      - name: 🔄 Observer Loop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKUP_ZIP_PASSWORD: ${{ secrets.BACKUP_ZIP_PASSWORD }}
        run: |
          set +e

          cleanup() {
            if [ -f /tmp/backup_done ]; then
              exit 0
            fi

            touch /tmp/backup_done
            docker kill n8n >/dev/null 2>&1 || true
            docker kill wa-bot caddy cloudflared >/dev/null 2>&1 || true
            timeout 8s node smart_sync.js up_fast || true
            exit 0
          }

          trap 'cleanup' SIGINT SIGTERM SIGHUP

          START=$(date +%s)
          LAST_FULL_BACKUP_SLOT=""
          HANDOVER_SENT=0
          HANDOVER_TS=0

          while true; do
            NOW=$(date +%s)
            DIFF=$((NOW - START))

            if [ $DIFF -ge 21000 ] && [ $HANDOVER_SENT -eq 0 ]; then
              gh workflow run "${{ github.workflow }}" || true
              HANDOVER_SENT=1
              HANDOVER_TS=$NOW
            fi

            if [ $HANDOVER_SENT -eq 1 ] && [ $((NOW - HANDOVER_TS)) -ge 300 ]; then
              HANDOVER_SENT=0
              HANDOVER_TS=0
            fi

            docker ps --format '{{.Names}}' | grep -qx wa-bot || docker restart wa-bot >/dev/null 2>&1 || true
            docker ps --format '{{.Names}}' | grep -qx n8n || docker restart n8n >/dev/null 2>&1 || true
            docker ps --format '{{.Names}}' | grep -qx caddy || docker restart caddy >/dev/null 2>&1 || true
            docker ps --format '{{.Names}}' | grep -qx cloudflared || docker restart cloudflared >/dev/null 2>&1 || true

            SLOT=$((DIFF / 900))
            if [ $((DIFF % 900)) -lt 10 ] && [ "$LAST_FULL_BACKUP_SLOT" != "$SLOT" ]; then
              LAST_FULL_BACKUP_SLOT="$SLOT"
              node smart_sync.js up_full >/dev/null 2>&1 || true
            fi

            sleep 10
          done
